<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sinh viên</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        th a { text-decoration: none; color: white; }
        th a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container mt-4">

    <h2 class="mb-4">DANH SÁCH SINH VIÊN</h2>
    <form th:action="@{/students}" method="get" class="row g-2 mb-3">
        <input type="hidden" name="sortField" th:value="${sortField}">
        <input type="hidden" name="sortDir" th:value="${sortDir}">

        <div class="col-md-5">
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   class="form-control"
                   placeholder="Tìm theo họ tên hoặc mã sinh viên...">
        </div>
        <div class="col-md-4">
            <button type="submit" class="btn btn-primary me-2">Tìm kiếm</button>
            <a th:href="@{/students}" class="btn btn-outline-secondary">Xóa lọc</a>
        </div>
        <div class="col-md-3 text-end">
            <a th:href="@{/students/add}" class="btn btn-success">+ Thêm mới</a>
        </div>
    </form>
    <div th:if="${students.isEmpty()}" class="alert alert-info text-center">
        Chưa có sinh viên nào trong hệ thống.
    </div>
    <div th:if="${!students.isEmpty()}">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>STT</th>
                <th>
                    <a th:href="@{/students(
                        keyword=${keyword},
                        sortField='studentCode',
                        sortDir=${sortField == 'studentCode' ? reverseSortDir : 'asc'})}">
                        Mã SV
                        <span th:if="${sortField == 'studentCode'}"
                              th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/students(
                        keyword=${keyword},
                        sortField='fullName',
                        sortDir=${sortField == 'fullName' ? reverseSortDir : 'asc'})}">
                        Họ tên
                        <span th:if="${sortField == 'fullName'}"
                              th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>

                <th>Email</th>
                <th>Ngành</th>

                <!-- Cột GPA: click để sắp xếp -->
                <th>
                    <a th:href="@{/students(
                        keyword=${keyword},
                        sortField='gpa',
                        sortDir=${sortField == 'gpa' ? reverseSortDir : 'asc'})}">
                        GPA
                        <span th:if="${sortField == 'gpa'}"
                              th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>

                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student, stat : ${students}">
                <td th:text="${stat.count}"></td>
                <td th:text="${student.studentCode}"></td>
                <td th:text="${student.fullName}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.major}"></td>
                <td th:text="${student.gpa}"></td>
                <td>
                    <a th:href="@{/students/edit/{id}(id=${student.id})}"
                       class="btn btn-warning btn-sm">Sửa</a>
                    <a th:href="@{/students/delete/{id}(id=${student.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa sinh viên này không?')">
                        Xóa
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <nav th:if="${studentPage.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${studentPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/students(page=${studentPage.number - 1}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir})}">
                    Trước
                </a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, studentPage.totalPages - 1)}"
                th:classappend="${i == studentPage.number} ? 'active'">

                <a class="page-link"
                   th:href="@{/students(page=${i}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir})}"
                   th:text="${i + 1}">
                </a>
            </li>
            <li class="page-item" th:classappend="${studentPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/students(page=${studentPage.number + 1}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir})}">
                    Sau
                </a>
            </li>

        </ul>
    </nav>

</div>
</body>
</html>
