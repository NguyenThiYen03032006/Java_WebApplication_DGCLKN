<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title th:text="${student.id == null} ? 'Thêm Sinh viên' : 'Cập nhật Sinh viên'"></title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .err { color: red; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4"
        th:text="${student.id == null} ? 'THÊM MỚI' : 'CẬP NHẬT'">
    </h2>
    <form th:object="${student}"
          th:action="${student.id == null} ? @{/students/add} : @{/students/edit/{id}(id=${student.id})}"
          method="post"
          class="col-md-6">
        <div class="mb-3">
            <label class="form-label fw-bold">
                Mã Sinh viên <span class="text-danger">*</span>
            </label>
            <input type="text"
                   th:field="*{studentCode}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('studentCode')} ? 'is-invalid'"
                   placeholder="VD: SV1234">
            <span class="err"
                  th:if="${#fields.hasErrors('studentCode')}"
                  th:errors="*{studentCode}">
            </span>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">
                Họ tên <span class="text-danger">*</span>
            </label>
            <input type="text"
                   th:field="*{fullName}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                   placeholder="Nhập họ và tên sinh viên">
            <span class="err"
                  th:if="${#fields.hasErrors('fullName')}"
                  th:errors="*{fullName}">
            </span>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">
                Email <span class="text-danger">*</span>
            </label>
            <input type="text"
                   th:field="*{email}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="VD: example@gmail.com">
            <span class="err"
                  th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}">
            </span>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">
                Ngành học <span class="text-danger">*</span>
            </label>
            <select th:field="*{major}"
                    class="form-select"
                    th:classappend="${#fields.hasErrors('major')} ? 'is-invalid'">
                <option value="">-- Chọn ngành --</option>
                <option th:each="nganh : ${danhSachNganh}"
                        th:value="${nganh}"
                        th:text="${nganh}">
                </option>
            </select>
            <span class="err"
                  th:if="${#fields.hasErrors('major')}"
                  th:errors="*{major}">
            </span>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">
                GPA (thang điểm 10) <span class="text-danger">*</span>
            </label>
            <input type="number"
                   th:field="*{gpa}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('gpa')} ? 'is-invalid'"
                   placeholder="VD: 8.5"
                   step="0.1" min="0" max="10">
            <span class="err"
                  th:if="${#fields.hasErrors('gpa')}"
                  th:errors="*{gpa}">
            </span>
        </div>
        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary"
                    th:text="${student.id == null} ? 'Thêm mới' : 'Lưu thay đổi'">
            </button>
            <a th:href="@{/students}" class="btn btn-secondary">Hủy</a>
        </div>

    </form>
</div>
</body>
</html>
